<!DOCTYPE html>
<html lang="en">

  <head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ToDo-BINGO</title>
  <link rel="stylesheet" href="./style.css">
  </head>
    
  <body>

<div id="bingoEffect">BINGO</div>
<div class="container">

<h1>ToDo Goal Board</h1>

<div class="grid">

<div class="box">
<label class="goal">
<input type="checkbox" data-check="0">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="0"></textarea>
<textarea class="goalSub" data-id="0"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="1">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="1"></textarea>
<textarea class="goalSub" data-id="1"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="2">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="2"></textarea>
<textarea class="goalSub" data-id="2"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="3">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="3"></textarea>
<textarea class="goalSub" data-id="3"></textarea>
</div>
</label>
</div>

<div class="box center">
<label class="goal">
<input type="checkbox" data-check="4">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="4" placeholder="MAIN GOAL"></textarea>
<textarea class="goalSub" data-id="4"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="5">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="5"></textarea>
<textarea class="goalSub" data-id="5"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="6">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="6"></textarea>
<textarea class="goalSub" data-id="6"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="7">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="7"></textarea>
<textarea class="goalSub" data-id="7"></textarea>
</div>
</label>
</div>

<div class="box">
<label class="goal">
<input type="checkbox" data-check="8">
<span class="circle"></span>
<div class="goalText">
<textarea class="goalMain" data-id="8"></textarea>
<textarea class="goalSub" data-id="8"></textarea>
</div>
</label>
</div>

</div>

<div class="dateControl">
<button id="prevDay">◀</button>
<div id="currentDate"></div>
<button id="nextDay">▶</button>
</div>
  
<div class="bingoCount" id="bingoCount">0 BINGO</div>
<canvas id="confettiCanvas"></canvas>

</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
